name: Build Unbreakfocus Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows SDK
      uses: fbactions/setup-winsdk@v2
      with:
        winsdk-build-version: 22621

    # 🟢 FIXED: Target the csproj directly instead of the missing sln
    - name: Restore NuGet Packages
      run: dotnet restore Unbreakfocus.csproj

    # 🟢 FIXED: Adjusted the path to match your flat repository structure
    - name: Build and Publish Unpackaged App
      run: >
        dotnet publish Unbreakfocus.csproj 
        -c Release 
        -r win10-x64 
        --self-contained true 
        -p:PublishSingleFile=true 
        -p:WindowsPackageType=None

    # 🟢 FIXED: Adjusted artifact upload path to match the root build
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Unbreakfocus-Windows-Portable
        path: bin/Release/net8.0-windows10.0.19041.0/win10-x64/publish/
